services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: autotrader
      POSTGRES_USER: autotrader
      POSTGRES_PASSWORD: autotrader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotrader"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
