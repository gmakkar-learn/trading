secrets_backend: env                 # env (local dev) | aws (Phase 3+ EC2)

polling:
  normal_interval_seconds: 300
  elevated_interval_seconds: 60

active_markets: [us, india]

broker_mode: paper

alerts:
  telegram_enabled: true
  email_enabled: false
  approval_channel: telegram
  approval_timeout_min: 30         # auto-expire (not auto-approve) on timeout

trader:
  auto_threshold: 80               # composite_score >= this → auto-execute; below → Telegram approval
