version: "1.0"

# Which strategy's cached signal to use as the fundamental gate.
fundamental_strategy_id: "fundamental_v1"

# How long a cached fundamental BUY signal stays valid for hybrid confirmation.
# Post-earnings consolidation typically resolves within 5–7 days; 168h (7 days)
# captures the full window while avoiding stale signals from the prior quarter.
fundamental_ttl_hours: 168

# Combined score = fundamental * fw + technical * tw
weights:
  fundamental: 0.60
  technical:   0.40

thresholds:
  fundamental_min_score: 70   # fundamental BUY must score >= this
  technical_min_score:   60   # technical composite must score >= this
  combined_buy:          65   # weighted combined must score >= this to emit

indicators:
  sma_crossover:
    fast: 50
    slow: 200
  rsi:
    period: 14
    oversold: 30
    overbought: 70
  macd:
    fast: 12
    slow: 26
    signal: 9
  weights:
    sma: 0.40
    rsi: 0.30
    macd: 0.30

execution:
  stoploss_pct: 0.05
  target_pct:   0.10

# Per-market configuration overrides.
# Keys must match market_id values used in CandleEvent / AnnouncementEvent.
market_overrides:
  india:
    # 36-month backtest (39 signals, ^NSMIDCP regime filter) showed the SMA/RSI/MACD
    # technical gate selected for "already-moved" small/mid-caps, cutting the +10d
    # win rate from 56% (fundamental-only) to 33% (hybrid). Disabling the gate
    # for India preserves the fundamental edge. Score ≥70 passes the pre-live gate.
    technical_gate_enabled: false
    fundamental_min_score: 70   # India-specific floor (matches global default; explicit)
